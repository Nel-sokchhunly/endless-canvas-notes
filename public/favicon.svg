<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="12" fill="#0F0F0F" />

  <!-- Shadow behind note -->
  <rect
    x="17"
    y="19"
    width="32"
    height="32"
    rx="4"
    fill="#000000"
    fill-opacity="0.22"
    transform="rotate(-4 17 19)"
  />

  <!-- Sticky note body -->
  <rect
    x="15"
    y="17"
    width="32"
    height="32"
    rx="4"
    fill="#FEF08A"
    transform="rotate(-4 15 17)"
  />

  <!-- Header strip -->
  <rect
    x="16"
    y="18"
    width="30"
    height="7"
    rx="3"
    fill="#FDE047"
    transform="rotate(-4 16 18)"
  />

  <!-- Folded corner -->
  <path
    d="M46 43 L46 49 L40 49 Z"
    fill="#EAB308"
    fill-opacity="0.9"
    transform="rotate(-4 46 43)"
  />

  <!-- Subtle writing lines -->
  <line
    x1="19"
    y1="31"
    x2="41"
    y2="31"
    stroke="#FACC15"
    stroke-width="1.4"
    stroke-linecap="round"
    stroke-opacity="0.85"
    transform="rotate(-4 19 31)"
  />
  <line
    x1="19"
    y1="35"
    x2="39"
    y2="35"
    stroke="#FACC15"
    stroke-width="1.3"
    stroke-linecap="round"
    stroke-opacity="0.7"
    transform="rotate(-4 19 35)"
  />
  <line
    x1="19"
    y1="39"
    x2="34"
    y2="39"
    stroke="#FACC15"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-opacity="0.55"
    transform="rotate(-4 19 39)"
  />
</svg>

